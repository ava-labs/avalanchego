// gRPC service defining the oracle attestation contract between AvalancheGo
// validators and their sidecar. Regenerate the Go bindings under
// proto/pb/oracle/ via `buf generate` when this file changes.

syntax = "proto3";

package oracle;

option go_package = "github.com/ava-labs/avalanchego/proto/pb/oracle";

// OracleSidecar is implemented by the process that queries the source chain
// (e.g. a Solana RPC node). The validator calls Verify once per cache miss on
// the oracle signature handler (p2p handler ID 4). The sidecar must be safe
// for concurrent calls.
service OracleSidecar {
  // Verify checks that the event described by the OracleMessage actually
  // occurred on the source chain. Returns OK on success, INVALID_ARGUMENT if
  // the event cannot be confirmed, UNAVAILABLE if the source chain is
  // unreachable.
  rpc Verify(VerifyRequest) returns (VerifyResponse) {}
}

message VerifyRequest {
  // message_bytes is the ABI-encoded OracleMessage that will be signed.
  // The sidecar decodes this to learn what event to look up on the source chain.
  bytes message_bytes = 1;
  // justification carries lookup hints supplied by the relayer (e.g. a Solana
  // transaction signature). Not part of the signed output.
  bytes justification = 2;
}

// Empty response — success is signalled by the gRPC status code OK.
message VerifyResponse {}

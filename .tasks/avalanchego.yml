# https://taskfile.dev
# Project-owned workflows for the avalanchego project.
# To run on a system without task installed, `./scripts/run_task.sh` will
# prefer a task binary in the PATH and otherwise run task with `go tool`.
# If in the nix dev shell, repo tasks use the pinned toolchain.

version: '3'

vars:
  # Task entrypoints run through the repo's nix wrapper so they use the pinned
  # dev-shell toolchain when nix is available, without depending on cwd.
  NIX_RUN: '{{printf "%s/../scripts/nix_run.sh" .TASKFILE_DIR}}'

tasks:
  default: './scripts/run_task.sh --list'

  build-bazel:
    desc: Build avalanchego with Bazel
    cmd: '{{.NIX_RUN}} bazelisk build //main:avalanchego'

  build-opt-bazel:
    desc: Build avalanchego with Bazel (optimized)
    cmd: '{{.NIX_RUN}} bazelisk build --compilation_mode=opt //main:avalanchego'

  build-race-bazel:
    desc: Build avalanchego with Bazel (race detection)
    cmd: '{{.NIX_RUN}} ./scripts/run_bazel_ci_command.sh build --config=race //main:avalanchego'

  build-bootstrap-monitor:
    desc: Builds bootstrap-monitor
    cmd: '{{.NIX_RUN}} ./scripts/build_bootstrap_monitor.sh'

  build-bootstrap-monitor-image:
    desc: Builds docker image for bootstrap-monitor
    cmd: '{{.NIX_RUN}} ./scripts/build_bootstrap_monitor_image.sh'

  build-gomod:
    desc: Builds avalanchego
    cmd: '{{.NIX_RUN}} ./scripts/build.sh'

  build-race-gomod:
    desc: Builds avalanchego with race detection enabled
    cmd: '{{.NIX_RUN}} ./scripts/build.sh -r'

  build-image:
    desc: Builds docker image for avalanchego
    cmd: '{{.NIX_RUN}} ./scripts/build_image.sh'


  build-tmpnetctl:
    desc: Builds tmpnetctl
    cmd: '{{.NIX_RUN}} ./scripts/build_tmpnetctl.sh'

  build-xsvm:
    desc: Builds xsvm plugin
    cmd: '{{.NIX_RUN}} ./scripts/build_xsvm.sh'

  build-xsvm-image:
    desc: Builds xsvm image
    cmd: '{{.NIX_RUN}} ./scripts/build_xsvm_image.sh'

  build-antithesis-images-avalanchego:
    desc: Builds docker images for antithesis for the avalanchego test setup
    env:
      TEST_SETUP: avalanchego
    cmd: '{{.NIX_RUN}} bash -x ./scripts/build_antithesis_images.sh'

  build-antithesis-images-xsvm:
    desc: Builds docker images for antithesis for the xsvm test setup
    env:
      TEST_SETUP: xsvm
    cmd: '{{.NIX_RUN}} bash -x ./scripts/build_antithesis_images.sh'

  check-generate-canoto:
    desc: Checks that generated canoto is up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-canoto
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh git:check-clean-branch'

  check-generate-load-contract-bindings:
    desc: Checks that generated load contract bindings are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-load-contract-bindings
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh git:check-clean-branch'

  check-generate-mocks:
    desc: Checks that generated mocks are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-mocks
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh git:check-clean-branch'

  check-generate-protobuf:
    desc: Checks that generated protobuf is up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-protobuf
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh git:check-clean-branch'

  check-yaml-fmt:
    desc: Checks that YAML files are formatted with yamlfmt (requires a clean git working tree)
    cmds:
      - task: lint-yaml-fix
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh git:check-clean-branch'

  collect-kind-diagnostics:
    desc: Collects runner, Docker, kind, and Kubernetes diagnostics. Optional arg is output dir.
    cmd: '{{.NIX_RUN}} ./scripts/collect_kind_diagnostics.sh {{.CLI_ARGS}}'

  create-kind-cluster:
    desc: Creates the default kind cluster
    cmd: '{{.NIX_RUN}} bash -x ./scripts/start_kind_cluster.sh {{.CLI_ARGS}}'

  delete-kind-cluster:
    desc: Deletes the default kind cluster
    cmd: '{{.NIX_RUN}} kind delete cluster'

  export-cchain-block-range:
    desc: Export range of C-Chain blocks from source to target directory.
    cmd: '{{.NIX_RUN}} go run github.com/ava-labs/avalanchego/tests/reexecute/blockexport {{.CLI_ARGS}}'

  generate-canoto:
    desc: Generates canoto
    cmd: '{{.NIX_RUN}} go generate -run "canoto" ./...'

  generate-load-contract-bindings:
    desc: Generates load contract bindings
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "grep -lr -E ''^// Code generated - DO NOT EDIT\\.$'' tests/load | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} go generate ./tests/load/...'

  generate-mocks:
    desc: Generates testing mocks
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "grep -lr -E ''^// Code generated by MockGen\\. DO NOT EDIT\\.$'' . | grep -v ''^./graft'' | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} go generate -run "mockgen" ./...'

  generate-protobuf:
    desc: Generates protobuf
    cmd: '{{.NIX_RUN}} ./scripts/protobuf_codegen.sh'

  ginkgo-build:
    desc: Runs ginkgo against the current working directory
    cmd: '{{.NIX_RUN}} ./bin/ginkgo build {{.USER_WORKING_DIR}}'


  lint:
    desc: Runs all lint checks
    cmds:
      - task: _lint-readonly-parallel
      - task: _lint-readonly-serial
      - task: check-yaml-fmt
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-mod-tidy'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-require-directives-round-trip'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh bazel:check-metadata'

  lint-action:
    desc: Runs actionlint to check sanity of github action configuration
    cmd: '{{.NIX_RUN}} ./scripts/actionlint.sh'

  lint-ci:
    desc: Runs all lint checks one-by-one
    cmds:
      - task: lint-go
      - task: lint-saevm
      - task: lint-action
      - task: lint-shell
      - task: test-run-task-launcher
      - task: check-yaml-fmt
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-mod-tidy'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-version'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-require-directives'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh go:check-require-directives-round-trip'
      - cmd: '{{.NIX_RUN}} ./scripts/run_task.sh bazel:check-metadata'

  lint-go:
    desc: Runs static analysis tests of golang code
    cmd: '{{.NIX_RUN}} ./scripts/lint.sh'

  lint-go-fix:
    desc: Runs automated fixing for failing static analysis of golang code
    cmd: '{{.NIX_RUN}} ./scripts/run_tool.sh golangci-lint run --config .golangci.yml --fix'

  lint-saevm:
    desc: Runs gosec with G115 enabled on vms/saevm
    cmd: '{{.NIX_RUN}} ./scripts/run_tool.sh golangci-lint run --config .gosec-golangci.yml ./vms/saevm/...'

  lint-shell:
    desc: Runs shellcheck to check sanity of shell scripts
    cmd: '{{.NIX_RUN}} ./scripts/shellcheck.sh'

  lint-yaml-fix:
    desc: Formats YAML files with yamlfmt
    cmd: '{{.NIX_RUN}} yamlfmt .'

  _lint-readonly-parallel:
    internal: true
    deps:
      - lint-action
      - lint-shell

  _lint-readonly-serial:
    internal: true
    cmds:
      - task: lint-go
      - task: lint-saevm

  setup-chain-data:
    desc: Sets up C-Chain test data (blocks from S3, state from S3 or empty for genesis).
    cmd: '{{.NIX_RUN}} ./scripts/setup_cchain_data.sh'

  test-bootstrap-monitor-e2e:
    desc: Runs bootstrap monitor e2e tests
    cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.bootstrap_monitor.sh'

  test-build-antithesis-images-avalanchego:
    desc: Tests the build of antithesis images for the avalanchego test setup
    env:
      TEST_SETUP: avalanchego
    cmds:
      - task: build-race-gomod
      - cmd: '{{.NIX_RUN}} go run ./tests/antithesis/avalanchego --avalanchego-path=./build/avalanchego --duration=120s'
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.build_antithesis_images.sh'

  test-build-antithesis-images-xsvm:
    desc: Tests the build of antithesis images for the xsvm test setup
    env:
      TEST_SETUP: xsvm
    cmds:
      - task: build-race-gomod
      - task: build-xsvm
      - cmd: '{{.NIX_RUN}} go run ./tests/antithesis/xsvm --avalanchego-path=./build/avalanchego --duration=120s'
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.build_antithesis_images.sh'

  test-build-image:
    desc: Runs test of cross-platform docker image build
    cmd: '{{.NIX_RUN}} bash -x scripts/tests.build_image.sh'

  test-cchain-reexecution:
    desc: Runs C-Chain re-execution test. Run without args to see available tests.
    cmd: '{{.NIX_RUN}} ./scripts/benchmark_cchain_range.sh {{.CLI_ARGS}}'

  test-e2e-bazel:
    desc: Run E2E tests with bazel-built binary
    cmds:
      - task: build-bazel
      - task: build-xsvm
      - cmd: |
          {{.NIX_RUN}} bash -c 'AVALANCHEGO_PATH=$(bazelisk cquery --output=files //main:avalanchego 2>/dev/null) bash -x ./scripts/tests.e2e.existing.sh'

  test-e2e-bazel-ci:
    desc: Run E2E tests with bazel-built binary [serially with race detection]
    env:
      E2E_SERIAL: 1
    cmds:
      - task: build-race-bazel
      - task: build-xsvm
      - cmd: |
          {{.NIX_RUN}} bash -c 'AVALANCHEGO_PATH=$(bazelisk cquery --output=files //main:avalanchego 2>/dev/null) bash -x ./scripts/tests.e2e.existing.sh'

  test-e2e-existing-gomod-ci:
    desc: Runs e2e tests with an existing network [serially with race detection enabled]
    env:
      E2E_SERIAL: 1
    cmds:
      - task: build-race-gomod
      - task: build-xsvm
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.existing.sh {{.CLI_ARGS}}'

  test-e2e-gomod:
    desc: Runs e2e tests
    cmds:
      - task: build-gomod
      - task: build-xsvm
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.sh {{.CLI_ARGS}}'

  test-e2e-gomod-ci:
    desc: Runs e2e tests [serially with race detection enabled]
    env:
      E2E_SERIAL: 1
    cmds:
      - task: build-race-gomod
      - task: build-xsvm
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.sh {{.CLI_ARGS}}'

  test-e2e-kube:
    desc: Runs e2e tests against a network deployed to kube
    cmds:
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.kube.sh {{.CLI_ARGS}}'

  test-e2e-kube-ci:
    desc: Runs the xsvm e2e tests in serial against a network deployed to kube
    env:
      E2E_SERIAL: 1
    cmds:
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.e2e.kube.sh --ginkgo.focus-file=xsvm.go {{.CLI_ARGS}}'

  test-fuzz:
    desc: Smoke tests fuzz infrastructure with a quick package
    vars:
      FUZZTIME: '{{.FUZZTIME| default "10"}}'
    cmd: '{{.NIX_RUN}} ./scripts/build_fuzz.sh {{.FUZZTIME}} ./utils/cb58'

  test-fuzz-long:
    desc: Runs each fuzz test for 180 seconds
    vars:
      FUZZTIME: '{{.FUZZTIME| default "180"}}'
    cmd: '{{.NIX_RUN}} ./scripts/build_fuzz.sh {{.FUZZTIME}} {{.CLI_ARGS}}'

  test-load:
    desc: Runs load tests
    cmds:
      - task: generate-load-contract-bindings
      - task: build-gomod
      - cmd: '{{.NIX_RUN}} go run ./tests/load/main --avalanchego-path=./build/avalanchego {{.CLI_ARGS}}'

  test-load-exclusive:
    desc: Runs load tests against kube with exclusive scheduling
    cmds:
      - cmd: '{{.NIX_RUN}} go run ./tests/load/main --runtime=kube --kube-use-exclusive-scheduling {{.CLI_ARGS}}'

  test-load-kube:
    desc: Runs load tests against a kubernetes cluster
    cmds:
      - task: generate-load-contract-bindings
      - cmd: '{{.NIX_RUN}} go run ./tests/load/main --runtime=kube {{.CLI_ARGS}}'

  test-load-kube-kind:
    desc: Runs load tests against a kind cluster
    cmds:
      - task: generate-load-contract-bindings
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.load.kube.kind.sh {{.CLI_ARGS}}'

  test-robustness:
    desc: Deploys kind with chaos mesh. Intended to eventually run a robustness (fault-injection) test suite.
    cmds:
      - cmd: '{{.NIX_RUN}} ./bin/tmpnetctl start-kind-cluster --install-chaos-mesh'

  test-run-task-launcher:
    desc: Tests the run_task launcher behavior
    cmd: '{{.NIX_RUN}} ./scripts/test_run_task_launcher.sh'

  test-unit-bazel:
    desc: Run avalanchego-root unit tests with Bazel
    cmd: '{{.NIX_RUN}} ./scripts/run_bazel_ci_command.sh test //... -- -//graft/...'

  test-unit-gomod:
    desc: Runs unit tests
    cmd: '{{.NIX_RUN}} bash ./scripts/build_test.sh'

  test-unit-gomod-fast:
    desc: Runs unit tests without race detection or shuffle
    env:
      NO_SHUFFLE: TRUE
      NO_RACE: TRUE
    cmd: '{{.NIX_RUN}} bash ./scripts/build_test.sh'

  test-upgrade:
    desc: Runs upgrade tests
    cmds:
      - task: build-gomod
      - cmd: '{{.NIX_RUN}} bash -x ./scripts/tests.upgrade.sh {{.CLI_ARGS}}'


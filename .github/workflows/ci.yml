name: AvalancheGo

on:
  push:
    tags:
      - "*"
    branches:
      - master
      - dev
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  avalanchego-required:
    if: ${{ always() }}
    needs:
      - avalanchego-test-unit-gomod
      - avalanchego-test-fuzz
      - avalanchego-test-e2e-gomod
      - avalanchego-test-e2e-gomod-schedule-latest
      - avalanchego-test-e2e-gomod-post-latest
      - avalanchego-test-e2e-kube
      - avalanchego-test-e2e-gomod-existing-network
      - avalanchego-test-upgrade
      - avalanchego-lint
      - avalanchego-check-tauseconds
      - avalanchego-check-markdown-links
      - avalanchego-check-generate-protobuf
      - avalanchego-check-generate-mocks
      - avalanchego-check-generate-canoto
      - avalanchego-check-generate-load-contract-bindings
      - go-check-mod-tidy
      - avalanchego-test-build-image
      - avalanchego-test-build-antithesis-images
      - avalanchego-test-build-antithesis-images-xsvm
      - avalanchego-test-bootstrap-monitor-e2e
      - avalanchego-test-load
      - avalanchego-test-load-kube-kind
      - avalanchego-test-robustness
    runs-on: ubuntu-24.04
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | .key
            ' <<<"$NEEDS_JSON"
          )"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  avalanchego-test-unit-gomod:
    name: avalanchego-test-unit-gomod (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-22.04, ubuntu-24.04, ubuntu-22.04-arm, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Run unit tests
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-unit-gomod
        env:
          TIMEOUT: ${{ env.TIMEOUT }}

  avalanchego-test-fuzz:
    name: avalanchego-test-fuzz
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Run fuzz smoke test
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-fuzz

  avalanchego-test-e2e-gomod:
    name: avalanchego-test-e2e-gomod (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v5
      - name: Run e2e tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-e2e-gomod-ci
          artifact_prefix: e2e-${{ matrix.os }}
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-e2e-gomod-schedule-latest:
    name: avalanchego-test-e2e-gomod-schedule-latest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run e2e tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-e2e-gomod-ci -- --activate-latest-after=4m
          artifact_prefix: e2e-schedule-latest
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-e2e-gomod-post-latest:
    name: avalanchego-test-e2e-gomod-post-latest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run e2e tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-e2e-gomod-ci -- --activate-latest-after=0
          artifact_prefix: e2e-post-latest
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-e2e-kube:
    name: avalanchego-test-e2e-kube
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-e2e-kube-ci
          runtime: kube
          artifact_prefix: e2e-kube
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-e2e-gomod-existing-network:
    name: avalanchego-test-e2e-gomod-existing-network
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run e2e tests with existing network
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-e2e-existing-gomod-ci
          artifact_prefix: e2e-existing-network
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-upgrade:
    name: avalanchego-test-upgrade
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run upgrade tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-upgrade
          artifact_prefix: upgrade
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-lint:
    name: avalanchego-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Run all lint checks
        shell: nix develop --command bash -x {0}
        run: ./scripts/run_task.sh avalanchego:lint-ci

  avalanchego-check-tauseconds:
    name: avalanchego-check-tauseconds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Check for TauSeconds misuse with time.Add()
        run: |
          if grep -rn '\.Add([^)]*TauSeconds' --include='*.go' .; then
            echo "ERROR: Use params.Tau (time.Duration) with time.Add(), not TauSeconds (int)"
            echo "TauSeconds would be interpreted as nanoseconds, not seconds"
            exit 1
          fi

  avalanchego-check-markdown-links:
    name: avalanchego-check-markdown-links
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: umbrelladocs/action-linkspector@de84085e0f51452a470558693d7d308fbb2fa261 # v1.2.5
        with:
          fail_level: any

  avalanchego-check-generate-protobuf:
    name: avalanchego-check-generate-protobuf
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - shell: nix develop --command bash -x {0}
        run: ./scripts/run_task.sh avalanchego:check-generate-protobuf

  avalanchego-check-generate-mocks:
    name: avalanchego-check-generate-mocks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - shell: bash
        run: ./scripts/run_task.sh avalanchego:check-generate-mocks

  avalanchego-check-generate-canoto:
    name: avalanchego-check-generate-canoto
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - shell: bash
        run: ./scripts/run_task.sh avalanchego:check-generate-canoto

  avalanchego-check-generate-load-contract-bindings:
    name: avalanchego-check-generate-load-contract-bindings
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - shell: nix develop --command bash -x {0}
        run: ./scripts/run_task.sh avalanchego:check-generate-load-contract-bindings

  go-check-mod-tidy:
    name: go-check-mod-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - shell: bash
        run: ./scripts/run_task.sh go:check-mod-tidy

  avalanchego-test-build-image:
    name: avalanchego-test-build-image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU (required for cross-platform builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Check image build
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-build-image

  avalanchego-test-build-antithesis-images:
    name: avalanchego-test-build-antithesis-images
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Check image build for avalanchego test setup
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-build-antithesis-images-avalanchego

  avalanchego-test-build-antithesis-images-xsvm:
    name: avalanchego-test-build-antithesis-images-xsvm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Check image build for xsvm test setup
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-build-antithesis-images-xsvm

  avalanchego-test-bootstrap-monitor-e2e:
    name: avalanchego-test-bootstrap-monitor-e2e
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Run bootstrap monitor e2e tests
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-bootstrap-monitor-e2e
      - name: Collect kind diagnostics
        if: failure()
        uses: ./.github/actions/collect-kind-diagnostics
        with:
          artifact_name: bootstrap-monitor-kind-diagnostics

  avalanchego-test-load:
    name: avalanchego-test-load
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-load -- --load-timeout=30s
          artifact_prefix: load
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-load-kube-kind:
    name: avalanchego-test-load-kube-kind
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh avalanchego:test-load-kube-kind -- --load-timeout=30s
          runtime: kube
          artifact_prefix: load-kube
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  avalanchego-test-robustness:
    name: avalanchego-test-robustness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Deploy kind with chaos mesh
        shell: bash
        run: ./scripts/run_task.sh avalanchego:test-robustness
      - name: Collect kind diagnostics
        if: failure()
        uses: ./.github/actions/collect-kind-diagnostics
        with:
          artifact_name: robustness-kind-diagnostics

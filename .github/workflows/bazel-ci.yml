name: Bazel Tests

on:
  push:
    tags:
      - "*"
    branches:
      - master
      - dev
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

# Cancel ongoing workflow runs if a new one is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Bazel metadata
        uses: ./.github/actions/run-bazel-task
        with:
          task: bazel-check-metadata
  unit-main:
    needs: check-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests with Bazel
        uses: ./.github/actions/run-bazel-task
        with:
          task: bazel-test-main
  unit-coreth:
    needs: check-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run coreth unit tests with Bazel
        uses: ./.github/actions/run-bazel-task
        with:
          task: bazel-test-coreth
  unit-subnet-evm:
    needs: check-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run subnet-evm unit tests with Bazel
        uses: ./.github/actions/run-bazel-task
        with:
          task: bazel-test-subnet-evm
  e2e:
    needs: check-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e tests with Bazel-built binary
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh bazel-test-e2e-ci
          artifact_prefix: e2e-bazel
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

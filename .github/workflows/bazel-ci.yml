name: Bazel Jobs

# Reusable Bazel CI workflow for one platform. This workflow is called by
# bazel-ci-matrix.yml with a platform name and runner.
on:
  workflow_call:
    inputs:
      platform_name:
        required: true
        type: string
      runner:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # - On PR runs, BAZEL_IMPACTED_BASE_SHA is set to enable jobs to target only Bazel
  # targets impacted by the changes between BASE_SHA and the PR branch. In the event
  # that a PR run gives a false-negative due to e.g an environmental dependency, the
  # merge run should catch it.
  #
  # - On merge queue and post-merge runs, BAZEL_IMPACTED_BASE_SHA is not set. This
  # ensures that jobs run against all Bazel targets regardless of what changed to
  # avoid false-negatives e.g. due to an environmental dependency.
  #
  # - Jobs relying on BAZEL_IMPACTED_BASE_SHA must set `fetch-depth: 0` for
  # actions/checkout to ensure the history includes both the PR merge commit and the
  # base commit to compare against.
  # TODO(marun) Maybe this should be conditional?
  BAZEL_IMPACTED_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}

permissions:
  contents: read

jobs:
  # Aggregate the per-platform Bazel checks into one stable required job.
  # GitHub Actions job graphs are static, so Bazel still runs inside each
  # declared job.
  bazel-required:
    if: ${{ always() }}
    needs:
      - check-metadata
      - impactedtests-integration
      - unit-main
      - unit-coreth
      - unit-subnet-evm
      - e2e
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | .key
            ' <<<"$NEEDS_JSON"
          )"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  # Check Bazel metadata first so stale generated files fail with one
  # actionable error instead of cascading into multiple Bazel build/test
  # failures. This is especially important when PRs are tested against
  # the current base branch and the metadata included in the PR is stale
  # relative to it.
  check-metadata:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-repository-cache
        with:
          cache-save: true
      - name: Check Bazel metadata
        shell: bash
        run: ./scripts/run_task.sh bazel-check-metadata
      - name: Prefetch Bazel external dependencies
        shell: bash
        run: bazel fetch //...

  impactedtests-integration:
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: Run impactedtests integration test with Bazel
        shell: bash
        env:
          IMPACTEDTESTS_SOURCE_REPO: ${{ github.workspace }}
        run: |
          set -euo pipefail
          bazelisk test \
            --test_env=PATH \
            --test_env=IMPACTEDTESTS_SOURCE_REPO \
            //tools/impactedtests:integration_test

  unit-main:
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure sufficient history for bazel diff
      - uses: ./.github/actions/setup-bazel-repository-cache
      - name: Select impacted main-module unit tests
        id: select
        uses: ./.github/actions/select-bazel-tests
        with:
          manifest_path: .ci/unit-main-manifest.txt
          scopes: |
            //...
            -//graft/...
      - name: Run selective unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'selective' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-main
      - name: Run full unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'full' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-main-full

  unit-coreth:
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure sufficient history for bazel diff
      - uses: ./.github/actions/setup-bazel-repository-cache
      - name: Select impacted coreth/evm unit tests
        id: select
        uses: ./.github/actions/select-bazel-tests
        with:
          manifest_path: .ci/unit-coreth-manifest.txt
          scopes: |
            //graft/coreth/...
            //graft/evm/...
      - name: Run selective coreth unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'selective' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-coreth
      - name: Run full coreth unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'full' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-coreth-full

  unit-subnet-evm:
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure sufficient history for bazel diff
      - uses: ./.github/actions/setup-bazel-repository-cache
      - name: Select impacted subnet-evm unit tests
        id: select
        uses: ./.github/actions/select-bazel-tests
        with:
          manifest_path: .ci/unit-subnet-evm-manifest.txt
          scopes: |
            //graft/subnet-evm/...
      - name: Run selective subnet-evm unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'selective' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-subnet-evm
      - name: Run full subnet-evm unit tests with Bazel
        if: ${{ steps.select.outputs.execution_mode == 'full' }}
        shell: bash
        run: ./scripts/run_task.sh bazel-test-subnet-evm-full

  e2e:
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-repository-cache
      - name: Run e2e tests with Bazel-built binary
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh bazel-test-e2e-ci
          artifact_prefix: e2e-bazel-${{ inputs.platform_name }}
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  # Observational benchmark only: keep this off the required aggregate so it
  # can collect timing data without gating the rest of Bazel CI.
  benchmark-remote-cache:
    if: ${{ inputs.platform_name == 'linux-amd64' || inputs.platform_name == 'darwin-arm64' }}
    needs: check-metadata
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Measure representative cache-endpoint latency
        shell: nix develop --command bash -x {0}
        run: |
          set -euo pipefail
          bazelisk run //tools/measure-http-latency -- \
            --url https://prometheus-poc.avax-dev.network/ \
            --samples 10
      - name: Run Bazel remote cache benchmark
        shell: nix develop --command bash -x {0}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ./scripts/run_task.sh bazel-benchmark-remote-cache 2>&1 | tee artifacts/bazel-remote-cache-benchmark-${{ inputs.platform_name }}.log
      - name: Publish Bazel remote cache benchmark summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          log_file="artifacts/bazel-remote-cache-benchmark-${{ inputs.platform_name }}.log"
          if [[ ! -f "${log_file}" ]]; then
            exit 0
          fi

          {
            echo "## Bazel remote cache benchmark (${{ inputs.platform_name }})"
            echo
            echo '```text'
            awk '
              /^Setup result$/ {print; keep=1; next}
              keep {print}
            ' "${log_file}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Bazel remote cache benchmark log
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: bazel-remote-cache-benchmark-${{ inputs.platform_name }}
          path: artifacts/bazel-remote-cache-benchmark-${{ inputs.platform_name }}.log
          if-no-files-found: warn

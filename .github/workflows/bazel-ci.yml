name: Bazel Jobs

# Reusable Bazel CI workflow for one platform. This workflow is called by
# bazel-ci-matrix.yml with a platform name and runner.
on:
  workflow_call:
    inputs:
      platform_name:
        required: true
        type: string
      runner:
        required: true
        type: string
      unit_test_mode:
        required: false
        type: string
        default: race-shuffle
      run_e2e:
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BAZEL_CI_ENFORCE_DEPENDENCY_LIST: 1

permissions:
  contents: read

jobs:
  # Aggregate the per-platform Bazel checks into one stable required job.
  # GitHub Actions job graphs are static, so Bazel still runs inside each
  # declared job.
  bazel-required:
    if: ${{ always() }}
    needs:
      - setup
      - unit-main
      - unit-coreth
      - unit-subnet-evm
      - e2e
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          SKIPPABLE_JOBS_JSON: '["e2e"]'
        run: |
          failed_jobs="$({
            jq -r --argjson skippable_jobs "$SKIPPABLE_JOBS_JSON" '
              to_entries[]
              | select(
                  .value.result != "success"
                  and (
                    .value.result != "skipped"
                    or (.key as $job | ($skippable_jobs | index($job)) == null)
                  )
                )
              | .key
            ' <<<"$NEEDS_JSON"
          })"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  # Prepare Bazel CI for this platform before the later jobs run. Similar in intent to
  # setup-go, this job uses setup-bazel to check Bazel metadata and prepare cache
  # state for the dependencies that subsequent jobs are expected to need. That shifts
  # network access into one upfront step instead of having each later job discover
  # missing dependencies on its own.
  setup:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel
        with:
          initial-setup: true

  unit-main:
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel
      - name: Run unit tests with Bazel
        shell: bash
        run: |
          case '${{ inputs.unit_test_mode }}' in
            fast) task_name='bazel-test-main-fast' ;;
            race) task_name='bazel-test-main-race' ;;
            race-shuffle) task_name='bazel-test-main-race-shuffle' ;;
            *)
              echo "unknown unit test mode: ${{ inputs.unit_test_mode }}" >&2
              exit 1
              ;;
          esac
          ./scripts/run_task.sh "$task_name"

  unit-coreth:
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel
      - name: Run coreth unit tests with Bazel
        shell: bash
        run: |
          case '${{ inputs.unit_test_mode }}' in
            fast) task_name='bazel-test-coreth-fast' ;;
            race) task_name='bazel-test-coreth-race' ;;
            race-shuffle) task_name='bazel-test-coreth-race-shuffle' ;;
            *)
              echo "unknown unit test mode: ${{ inputs.unit_test_mode }}" >&2
              exit 1
              ;;
          esac
          ./scripts/run_task.sh "$task_name"

  unit-subnet-evm:
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel
      - name: Run subnet-evm unit tests with Bazel
        shell: bash
        run: |
          case '${{ inputs.unit_test_mode }}' in
            fast) task_name='bazel-test-subnet-evm-fast' ;;
            race) task_name='bazel-test-subnet-evm-race' ;;
            race-shuffle) task_name='bazel-test-subnet-evm-race-shuffle' ;;
            *)
              echo "unknown unit test mode: ${{ inputs.unit_test_mode }}" >&2
              exit 1
              ;;
          esac
          ./scripts/run_task.sh "$task_name"

  e2e:
    if: ${{ inputs.run_e2e }}
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel
      - name: Run e2e tests with Bazel-built binary
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh bazel-test-e2e-ci
          artifact_prefix: e2e-bazel-${{ inputs.platform_name }}
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

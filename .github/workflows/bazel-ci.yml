name: Bazel Tests

on:
  push:
    tags:
      - "*"
    branches:
      - master
      - dev
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

# Cancel ongoing workflow runs if a new one is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-main:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be #v1.3.1
        with:
          tool-cache: true
          docker-images: true
      - uses: actions/checkout@v4
      # Go is not used by Bazel (it downloads its own SDK via go_sdk.download),
      # but run_task.sh falls back to `go tool` to run the `task` binary when
      # it's not installed on the runner.
      - uses: ./.github/actions/setup-go-for-project
      - name: Run unit tests with Bazel
        shell: bash
        run: ./scripts/run_task.sh bazel-test-main
  unit-coreth:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be #v1.3.1
        with:
          tool-cache: true
          docker-images: true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-for-project
      - name: Run coreth unit tests with Bazel
        shell: bash
        run: ./scripts/run_task.sh bazel-test-coreth
  unit-subnet-evm:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be #v1.3.1
        with:
          tool-cache: true
          docker-images: true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-for-project
      - name: Run subnet-evm unit tests with Bazel
        shell: bash
        run: ./scripts/run_task.sh bazel-test-subnet-evm
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e tests with Bazel-built binary
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh bazel-test-e2e-ci
          artifact_prefix: e2e-bazel
          filter_by_owner: avalanchego-e2e
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

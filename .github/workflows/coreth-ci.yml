name: Coreth
on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  required:
    if: ${{ always() }}
    needs:
      - lint
      - test-unit-gomod
      - test-e2e-warp
    runs-on: ubuntu-24.04
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | .key
            ' <<<"$NEEDS_JSON"
          )"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Run all lint checks
        run: ./scripts/run_task.sh coreth:lint-ci
      - name: Check go.mod and go.sum are up-to-date
        run: ./scripts/run_task.sh coreth:check-go-mod-tidy

  test-unit-gomod:
    name: test-unit-gomod (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - run: ./scripts/run_task.sh coreth:test-unit-gomod
      - run: ./scripts/run_task.sh coreth:coverage

  test-e2e-warp:
    name: test-e2e-warp
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Warp E2E Tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh coreth:test-e2e-warp-ci
          artifact_prefix: warp
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

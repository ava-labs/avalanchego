name: EVM Shared
on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  required:
    if: ${{ always() }}
    needs:
      - lint
      - test-unit-gomod
    runs-on: ubuntu-24.04
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | .key
            ' <<<"$NEEDS_JSON"
          )"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Run all lint checks
        run: ./scripts/run_task.sh evm:lint-ci
      - name: Check go.mod and go.sum are up-to-date
        run: ./scripts/run_task.sh evm:check-go-mod-tidy

  test-unit-gomod:
    name: test-unit-gomod (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - run: ./scripts/run_task.sh evm:test-unit-gomod
      - run: ./scripts/run_task.sh evm:coverage

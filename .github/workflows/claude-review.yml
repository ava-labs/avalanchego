name: Claude Code Review
on:
  pull_request_target:
    types: [labeled]

jobs:
  review:
    if: >-
      github.event.label.name == 'ai-review' &&
      contains(fromJSON('["MEMBER", "COLLABORATOR", "OWNER", "CONTRIBUTOR"]'), github.event.pull_request.author_association) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for Claude to post PR comments and inline review feedback
      id-token: write # Required for OIDC authentication with Anthropic's API
    steps:
      - name: Checkout trusted prompt from master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: master
          sparse-checkout: agents/pr-review.md
          sparse-checkout-cone-mode: false
          path: trusted-prompt
          fetch-depth: 1
      - name: Read review prompt
        id: prompt
        run: |
          {
            echo 'content<<EOF'
            cat trusted-prompt/agents/pr-review.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

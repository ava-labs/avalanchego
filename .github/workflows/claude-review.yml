name: Claude Code Review
on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: >-
      github.event.label.name == 'ai-review' &&
      contains(fromJSON('["MEMBER", "COLLABORATOR", "OWNER", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for Claude to post PR comments and inline review feedback
      id-token: write # Required for OIDC authentication with Anthropic's API
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Read review prompt
        id: prompt
        run: |
          {
            echo 'content<<EOF'
            cat .github/prompts/pr-review-prompt.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

name: upload-pkg-s3

# Release-only S3 publication for build-{deb,rpm}-release.yml.
#
# Lives in its own workflow so id-token: write stays narrowly scoped to the
# upload job — never granted to a job that checks out a tag tree and runs
# packaging scripts from it.

on:
  workflow_call:
    inputs:
      pkg-format:
        description: 'Package format: "deb" or "rpm" (lowercase)'
        required: true
        type: string
      tag:
        description: 'Build tag, e.g. v1.14.2. Used in filename construction.'
        required: true
        type: string
      arches:
        description: 'JSON array of arches, e.g. ["amd64","arm64"] or ["x86_64","aarch64"]'
        required: true
        type: string
      packages:
        description: 'Space-separated package basenames, e.g. "avalanchego subnet-evm"'
        required: true
        type: string
      distros:
        description: 'Space-separated distro identifiers, e.g. "jammy noble" or "el9"'
        required: true
        type: string
      s3-prefix:
        description: 'S3 path prefix under the bucket, e.g. "linux/debs/ubuntu" or "linux/rpms/rhel"'
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      BUCKET:
        required: true

jobs:
  upload:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: ${{ fromJSON(inputs.arches) }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.pkg-format }}s-${{ matrix.arch }}
          path: build/${{ inputs.pkg-format }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Tighter session name aids CloudTrail attribution now that one
          # role serves multiple workflow_call callers and matrix arches.
          role-session-name: gha-upload-${{ inputs.pkg-format }}-${{ matrix.arch }}-${{ github.run_id }}
          aws-region: us-east-1

      - name: Install aws cli
        run: |
          if ! command -v aws &>/dev/null; then
            sudo snap install aws-cli --classic
          fi

      - name: Upload packages to S3
        env:
          TAG: ${{ inputs.tag }}
          ARCH: ${{ matrix.arch }}
          PKG_FORMAT: ${{ inputs.pkg-format }}
          PACKAGES: ${{ inputs.packages }}
          DISTROS: ${{ inputs.distros }}
          S3_PREFIX: ${{ inputs.s3-prefix }}
          BUCKET: ${{ secrets.BUCKET }}
        run: |
          set -euo pipefail
          # Defensive guards so a caller typo or invalid input fails fast
          # rather than uploading to a wrong S3 tree.
          case "${PKG_FORMAT}" in
            deb|rpm) ;;
            *) echo "ERROR: pkg-format must be deb or rpm, got '${PKG_FORMAT}'" >&2; exit 1 ;;
          esac
          : "${TAG:?tag is required}"
          : "${ARCH:?arch is required}"
          : "${S3_PREFIX:?s3-prefix is required}"
          : "${BUCKET:?BUCKET secret is required}"

          PKG_DIR="build/${PKG_FORMAT}"
          KEY_FILENAME="$(printf '%s' "${PKG_FORMAT}" | tr '[:lower:]' '[:upper:]')-GPG-KEY-avalanchego"
          # DISTROS and PACKAGES are space-separated strings — no jq required.
          for distro in ${DISTROS}; do
            for pkg in ${PACKAGES}; do
              aws s3 cp "${PKG_DIR}/${pkg}-${TAG}-${ARCH}.${PKG_FORMAT}" \
                "s3://${BUCKET}/${S3_PREFIX}/${distro}/${ARCH}/"
            done
            aws s3 cp "${PKG_DIR}/${KEY_FILENAME}" \
              "s3://${BUCKET}/${S3_PREFIX}/${distro}/"
          done

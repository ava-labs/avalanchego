name: build-rpm-packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build RPMs for'
        required: true
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/packaging/**"
      - ".github/workflows/build-rpm-release.yml"

jobs:
  build-rpm:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            rpm_arch: x86_64
          - arch: arm64
            runner: custom-arm64-jammy
            rpm_arch: aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: ./.github/actions/setup-packaging
        id: setup
        with:
          tag-input: ${{ github.event.inputs.tag }}
          gpg-private-key: ${{ github.event_name != 'pull_request' && secrets.RPM_GPG_PRIVATE_KEY || '' }}

      - name: Build and validate RPMs
        run: ./scripts/run_task.sh --taskfile .github/packaging/Taskfile.yml test-build-rpms
        env:
          PACKAGING_TAG: ${{ steps.setup.outputs.tag }}
          RPM_GPG_KEY_FILE: ${{ steps.setup.outputs.gpg-key-file }}
          NFPM_RPM_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

      - name: Upload RPMs as artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.rpm_arch }}
          path: |
            build/rpm/avalanchego-${{ steps.setup.outputs.tag }}-${{ matrix.rpm_arch }}.rpm
            build/rpm/subnet-evm-${{ steps.setup.outputs.tag }}-${{ matrix.rpm_arch }}.rpm
            build/rpm/RPM-GPG-KEY-avalanchego

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${{ steps.setup.outputs.gpg-key-file }}" ]]; then
            rm -f "${{ steps.setup.outputs.gpg-key-file }}"
          fi
          rm -rf build/rpm
          sudo rm -rf build/gpg
        shell: bash

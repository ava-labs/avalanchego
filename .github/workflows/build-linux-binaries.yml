name: build-linux-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        required: true
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-x86_64-binaries-tarball:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Build subnet-evm plugin
        working-directory: ./graft/subnet-evm
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Import GPG key
        run: |
          GPG_KEY_FILE="$(mktemp)"
          chmod 600 "${GPG_KEY_FILE}"
          printf '%s' "${{ secrets.RPM_GPG_PRIVATE_KEY }}" > "${GPG_KEY_FILE}"
          printf 'GPG_KEY_FILE=%s\n' "${GPG_KEY_FILE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from git
        if: "${{ github.event.inputs.tag == '' }}"
        id: get_tag_from_git
        run: |
          echo "TAG=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from workflow dispatch
        if: "${{ github.event.inputs.tag != '' }}"
        id: get_tag_from_workflow
        run: |
          echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Create tgz package structure and upload to S3
        run: ./.github/workflows/build-tgz-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "amd64"
          RELEASE: "jammy"
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-amd64
          path: |
            /tmp/avalanchego/avalanchego-linux-amd64-${{ env.TAG }}.tar.gz
            /tmp/avalanchego/avalanchego-linux-amd64-${{ env.TAG }}.tar.gz.sig

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-amd64
          path: |
            /tmp/avalanchego/subnet-evm-linux-amd64-${{ env.TAG }}.tar.gz
            /tmp/avalanchego/subnet-evm-linux-amd64-${{ env.TAG }}.tar.gz.sig

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${GPG_KEY_FILE:-}" ]]; then
            rm -f "${GPG_KEY_FILE}"
          fi
          rm -rf ./build
          rm -rf /tmp/avalanchego

  build-arm64-binaries-tarball:
    runs-on: ubuntu-22.04-arm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Build subnet-evm plugin
        working-directory: ./graft/subnet-evm
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Import GPG key
        run: |
          GPG_KEY_FILE="$(mktemp)"
          chmod 600 "${GPG_KEY_FILE}"
          printf '%s' "${{ secrets.RPM_GPG_PRIVATE_KEY }}" > "${GPG_KEY_FILE}"
          printf 'GPG_KEY_FILE=%s\n' "${GPG_KEY_FILE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from git
        if: "${{ github.event.inputs.tag == '' }}"
        id: get_tag_from_git
        run: |
          echo "TAG=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from workflow dispatch
        if: "${{ github.event.inputs.tag != '' }}"
        id: get_tag_from_workflow
        run: |
          echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Create tgz package structure and upload to S3
        run: ./.github/workflows/build-tgz-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "arm64"
          RELEASE: "jammy"
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-arm64
          path: |
            /tmp/avalanchego/avalanchego-linux-arm64-${{ env.TAG }}.tar.gz
            /tmp/avalanchego/avalanchego-linux-arm64-${{ env.TAG }}.tar.gz.sig

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-arm64
          path: |
            /tmp/avalanchego/subnet-evm-linux-arm64-${{ env.TAG }}.tar.gz
            /tmp/avalanchego/subnet-evm-linux-arm64-${{ env.TAG }}.tar.gz.sig

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${GPG_KEY_FILE:-}" ]]; then
            rm -f "${GPG_KEY_FILE}"
          fi
          rm -rf ./build
          rm -rf /tmp/avalanchego

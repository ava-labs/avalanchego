name: build-linux-release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-x86_64-binaries-tarball:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Build subnet-evm plugin
        working-directory: ./graft/subnet-evm
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Resolve tag
        # Assignment-first, NOT `echo "TAG=$(script)" >> …`: under bash -e a
        # failing command substitution inside echo's arguments is swallowed,
        # whereas a failing substitution in a plain assignment fails the step.
        run: |
          tag="$(./.github/workflows/release-resolve-tag.sh)"
          echo "TAG=${tag}" >> "$GITHUB_ENV"
        env:
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash

      - name: Create tgz package structure and upload to S3
        run: ./.github/workflows/build-tgz-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "amd64"
          RELEASE: "jammy"

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-amd64
          path: /tmp/avalanchego/avalanchego-linux-amd64-${{ env.TAG }}.tar.gz

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-amd64
          path: /tmp/avalanchego/subnet-evm-linux-amd64-${{ env.TAG }}.tar.gz

      - name: Cleanup
        run: |
          rm -rf ./build
          rm -rf /tmp/avalanchego

  build-arm64-binaries-tarball:
    runs-on: ubuntu-22.04-arm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Build subnet-evm plugin
        working-directory: ./graft/subnet-evm
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Resolve tag
        # Assignment-first, NOT `echo "TAG=$(script)" >> …`: under bash -e a
        # failing command substitution inside echo's arguments is swallowed,
        # whereas a failing substitution in a plain assignment fails the step.
        run: |
          tag="$(./.github/workflows/release-resolve-tag.sh)"
          echo "TAG=${tag}" >> "$GITHUB_ENV"
        env:
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash

      - name: Create tgz package structure and upload to S3
        run: ./.github/workflows/build-tgz-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "arm64"
          RELEASE: "jammy"

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-arm64
          path: /tmp/avalanchego/avalanchego-linux-arm64-${{ env.TAG }}.tar.gz

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-arm64
          path: /tmp/avalanchego/subnet-evm-linux-arm64-${{ env.TAG }}.tar.gz

      - name: Cleanup
        run: |
          rm -rf ./build
          rm -rf /tmp/avalanchego

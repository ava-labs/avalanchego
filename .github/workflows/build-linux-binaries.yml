name: build-linux-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        required: true
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-x86_64-binaries-tarball:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Import GPG key
        env:
          PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: |
          GPG_KEY_FILE="$(mktemp)"
          chmod 600 "${GPG_KEY_FILE}"
          printf '%s' "${PRIVATE_KEY}" > "${GPG_KEY_FILE}"
          printf 'GPG_KEY_FILE=%s\n' "${GPG_KEY_FILE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from git
        if: "${{ github.event.inputs.tag == '' }}"
        run: |
          echo "TAG=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from workflow dispatch
        if: "${{ github.event.inputs.tag != '' }}"
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "TAG=${INPUT_TAG}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build and validate tarballs
        run: ./scripts/run_task.sh --taskfile .github/packaging/Taskfile.yml test-build-tarballs
        env:
          PACKAGING_TAG: ${{ env.TAG }}
          TGZ_ARCH: amd64
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

      - name: Upload tarballs to S3
        env:
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: amd64
        run: |
          # Explicitly upload only .tar.gz and .tar.gz.sig, never GPG-KEY-avalanchego.
          find build/tgz -maxdepth 1 \
              \( -name '*.tar.gz' -o -name '*.tar.gz.sig' \) \
              -exec aws s3 cp {} "s3://${BUCKET}/linux/binaries/ubuntu/jammy/${ARCH}/" \;

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-amd64
          path: |
            build/tgz/avalanchego-linux-amd64-${{ env.TAG }}.tar.gz
            build/tgz/avalanchego-linux-amd64-${{ env.TAG }}.tar.gz.sig

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-amd64
          path: |
            build/tgz/subnet-evm-linux-amd64-${{ env.TAG }}.tar.gz
            build/tgz/subnet-evm-linux-amd64-${{ env.TAG }}.tar.gz.sig

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${GPG_KEY_FILE:-}" ]]; then
            rm -f "${GPG_KEY_FILE}"
          fi
          rm -rf ./build

  build-arm64-binaries-tarball:
    runs-on: ubuntu-22.04-arm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-go-for-project

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Import GPG key
        env:
          PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: |
          GPG_KEY_FILE="$(mktemp)"
          chmod 600 "${GPG_KEY_FILE}"
          printf '%s' "${PRIVATE_KEY}" > "${GPG_KEY_FILE}"
          printf 'GPG_KEY_FILE=%s\n' "${GPG_KEY_FILE}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from git
        if: "${{ github.event.inputs.tag == '' }}"
        run: |
          echo "TAG=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"
        shell: bash

      - name: Try to get tag from workflow dispatch
        if: "${{ github.event.inputs.tag != '' }}"
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "TAG=${INPUT_TAG}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build and validate tarballs
        run: ./scripts/run_task.sh --taskfile .github/packaging/Taskfile.yml test-build-tarballs
        env:
          PACKAGING_TAG: ${{ env.TAG }}
          TGZ_ARCH: arm64
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

      - name: Upload tarballs to S3
        env:
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: arm64
        run: |
          # Explicitly upload only .tar.gz and .tar.gz.sig, never GPG-KEY-avalanchego.
          find build/tgz -maxdepth 1 \
              \( -name '*.tar.gz' -o -name '*.tar.gz.sig' \) \
              -exec aws s3 cp {} "s3://${BUCKET}/linux/binaries/ubuntu/jammy/${ARCH}/" \;

      - name: Save avalanchego as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: avalanchego-arm64
          path: |
            build/tgz/avalanchego-linux-arm64-${{ env.TAG }}.tar.gz
            build/tgz/avalanchego-linux-arm64-${{ env.TAG }}.tar.gz.sig

      - name: Save subnet-evm as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: subnet-evm-arm64
          path: |
            build/tgz/subnet-evm-linux-arm64-${{ env.TAG }}.tar.gz
            build/tgz/subnet-evm-linux-arm64-${{ env.TAG }}.tar.gz.sig

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${GPG_KEY_FILE:-}" ]]; then
            rm -f "${GPG_KEY_FILE}"
          fi
          rm -rf ./build

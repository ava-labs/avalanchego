name: build-amd64-debian-packages

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to include in artifact name'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-jammy-amd64-package:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Resolve tag
        # Assignment-first, NOT `echo "TAG=$(script)" >> …`: under bash -e a
        # failing command substitution inside echo's arguments is swallowed,
        # whereas a failing substitution in a plain assignment fails the step.
        run: |
          tag="$(./.github/workflows/release-resolve-tag.sh)"
          echo "TAG=${tag}" >> "$GITHUB_ENV"
        env:
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash

      - name: Create debian package
        run: ./.github/workflows/build-deb-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "amd64"
          RELEASE: "jammy"

      - name: Save as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: debs-jammy-amd64
          path: /tmp/avalanchego/avalanchego-${{ env.TAG }}-amd64.deb

      - name: Cleanup
        run: |
          rm -rf ./build
          rm -rf /tmp/avalanchego

  build-noble-amd64-package:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - run: go version

      - name: Build the avalanchego binaries
        run: ./scripts/run_task.sh build

      - name: Install aws cli
        run: sudo snap install aws-cli --classic

      - name: Resolve tag
        # Assignment-first, NOT `echo "TAG=$(script)" >> …`: under bash -e a
        # failing command substitution inside echo's arguments is swallowed,
        # whereas a failing substitution in a plain assignment fails the step.
        run: |
          tag="$(./.github/workflows/release-resolve-tag.sh)"
          echo "TAG=${tag}" >> "$GITHUB_ENV"
        env:
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Create debian package
        run: ./.github/workflows/build-deb-pkg.sh
        env:
          PKG_ROOT: /tmp/avalanchego
          TAG: ${{ env.TAG }}
          BUCKET: ${{ secrets.BUCKET }}
          ARCH: "amd64"
          RELEASE: "noble"

      - name: Save as Github artifact
        uses: actions/upload-artifact@v6
        with:
          name: debs-noble-amd64
          path: /tmp/avalanchego/avalanchego-${{ env.TAG }}-amd64.deb

      - name: Cleanup
        run: |
          rm -rf ./build
          rm -rf /tmp/avalanchego

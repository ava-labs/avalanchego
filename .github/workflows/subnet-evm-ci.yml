name: Subnet-EVM

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  required:
    if: ${{ always() }}
    needs:
      - lint
      - test-unit-gomod
      - test-e2e-warp
      - test-e2e-load
      - test-build-image
      - test-build-antithesis-images
    runs-on: ubuntu-24.04
    steps:
      - name: Fail unless all needed jobs succeeded
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed_jobs="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | .key
            ' <<<"$NEEDS_JSON"
          )"

          if [[ -n "$failed_jobs" ]]; then
            echo "Required jobs failed:"
            printf '%s\n' "$failed_jobs"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-nix
      - name: Run all lint checks
        run: ./scripts/run_task.sh subnet-evm:lint-ci
      - name: Check go.mod and go.sum are up-to-date
        run: ./scripts/run_task.sh subnet-evm:check-go-mod-tidy

  test-unit-gomod:
    name: test-unit-gomod (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - run: ./scripts/run_task.sh subnet-evm:test-unit-gomod
      - run: ./scripts/run_task.sh subnet-evm:coverage

  test-e2e-warp:
    name: test-e2e-warp
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Warp E2E Tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh subnet-evm:test-e2e-warp-ci
          artifact_prefix: warp
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  test-e2e-load:
    name: test-e2e-load
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run E2E Load Tests
        uses: ./.github/actions/run-monitored-tmpnet-cmd
        with:
          run: ./scripts/run_task.sh subnet-evm:test-e2e-load-ci
          artifact_prefix: load
          prometheus_url: ${{ secrets.PROMETHEUS_URL || '' }}
          prometheus_push_url: ${{ secrets.PROMETHEUS_PUSH_URL || '' }}
          prometheus_username: ${{ secrets.PROMETHEUS_USERNAME || '' }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD || '' }}
          loki_url: ${{ secrets.LOKI_URL || '' }}
          loki_push_url: ${{ secrets.LOKI_PUSH_URL || '' }}
          loki_username: ${{ secrets.LOKI_USERNAME || '' }}
          loki_password: ${{ secrets.LOKI_PASSWORD || '' }}

  test-build-image:
    name: test-build-image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU (required for cross-platform builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Check image build
        run: ./scripts/run_task.sh subnet-evm:test-build-image

  test-build-antithesis-images:
    name: test-build-antithesis-images
    runs-on: ubuntu-24.04
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: true
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-go-for-project
      - name: Check image build for subnet-evm test setup
        shell: bash
        run: ./scripts/run_task.sh subnet-evm:test-build-antithesis-images

name: build-deb-packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build DEBs for'
        required: true
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/packaging/**"
      - ".github/workflows/build-deb-release.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deb:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            deb_arch: amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.setup.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # When building an older tag via workflow_dispatch, the tag's tree
      # may not contain the packaging scripts. Overlay them from the
      # workflow branch so that packaging:test-build-debs is available.
      - name: Overlay packaging scripts from workflow branch
        if: github.event.inputs.tag
        uses: actions/checkout@v4
        with:
          path: .packaging-overlay
          sparse-checkout: .github/packaging

      - name: Apply packaging overlay
        if: github.event.inputs.tag
        run: |
          rm -rf .github/packaging
          mv .packaging-overlay/.github/packaging .github/packaging
          rm -rf .packaging-overlay
        shell: bash

      - uses: ./.github/actions/setup-go-for-project

      - name: Set up packaging environment
        id: setup
        run: ./.github/packaging/scripts/workflow-setup-packaging.sh
        shell: bash
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
          GPG_PRIVATE_KEY: ${{ github.event_name != 'pull_request' && secrets.RPM_GPG_PRIVATE_KEY || '' }}

      - name: Build and validate DEBs
        run: ./scripts/run_task.sh --taskfile .github/packaging/Taskfile.yml test-build-debs
        env:
          PACKAGING_TAG: ${{ steps.setup.outputs.tag }}
          GPG_KEY_FILE: ${{ steps.setup.outputs.gpg-key-file }}
          GPG_KEY_PASSPHRASE: ${{ github.event_name != 'pull_request' && secrets.RPM_GPG_PASSPHRASE || '' }}

      - name: Upload DEBs as artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.deb_arch }}
          path: |
            build/deb/avalanchego-${{ steps.setup.outputs.tag }}-${{ matrix.deb_arch }}.deb
            build/deb/subnet-evm-${{ steps.setup.outputs.tag }}-${{ matrix.deb_arch }}.deb
            build/deb/GPG-KEY-avalanchego

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${{ steps.setup.outputs.gpg-key-file }}" ]]; then
            rm -f "${{ steps.setup.outputs.gpg-key-file }}"
          fi
          sudo rm -rf build/deb build/gpg
        shell: bash

  # Release-only S3 upload. Runs in its own job so id-token: write is
  # never granted to a job that checks out and executes PR-controlled
  # packaging scripts.
  upload-debs-s3:
    needs: build-deb
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        deb_arch: [amd64, arm64]
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download DEB artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs-${{ matrix.deb_arch }}
          path: build/deb

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_SA_ROLE_ARN }}
          role-session-name: githubrolesession
          aws-region: us-east-1

      - name: Install aws cli
        run: |
          if ! command -v aws &>/dev/null; then
            sudo snap install aws-cli --classic
          fi

      - name: Upload DEBs to S3
        env:
          TAG: ${{ needs.build-deb.outputs.tag }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          BUCKET: ${{ secrets.BUCKET }}
        run: |
          for release in jammy noble; do
            aws s3 cp "build/deb/avalanchego-${TAG}-${DEB_ARCH}.deb" \
              "s3://${BUCKET}/linux/debs/ubuntu/${release}/${DEB_ARCH}/"
            aws s3 cp "build/deb/subnet-evm-${TAG}-${DEB_ARCH}.deb" \
              "s3://${BUCKET}/linux/debs/ubuntu/${release}/${DEB_ARCH}/"
            aws s3 cp "build/deb/GPG-KEY-avalanchego" \
              "s3://${BUCKET}/linux/debs/ubuntu/${release}/"
          done

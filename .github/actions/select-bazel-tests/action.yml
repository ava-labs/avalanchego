name: 'Select impacted Bazel tests'
description: 'Compute an impacted-test manifest before paying for full Bazel/Nix bootstrap'

inputs:
  scopes:
    description: 'Newline-delimited Bazel scopes/target patterns to pass as repeated --scope arguments'
    required: true
  manifest_path:
    description: 'Path to write the selected-test manifest to'
    required: true

outputs:
  execution_mode:
    description: 'One of skip, selective, or full'
    value: ${{ steps.select.outputs.execution_mode }}
  manifest_path:
    description: 'Path to the selected-test manifest'
    value: ${{ steps.select.outputs.manifest_path }}

runs:
  using: composite
  steps:
    - name: Compute impacted test manifest
      id: select
      shell: bash
      env:
        SCOPES: ${{ inputs.scopes }}
        MANIFEST_PATH: ${{ inputs.manifest_path }}
      run: |
        set -euo pipefail

        echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

        if [[ -z "${BAZEL_IMPACTED_BASE_SHA:-}" ]]; then
          echo "No impacted diff range configured; proceeding with the full Bazel task"
          echo "execution_mode=full" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! command -v bazelisk >/dev/null 2>&1; then
          echo "WARNING: bazelisk not found on PATH; proceeding with the full Bazel task" >&2
          echo "execution_mode=full" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        manifest_dir=$(dirname "$MANIFEST_PATH")
        mkdir -p "$manifest_dir"

        selector_bin_dir=$(mktemp -d)
        trap 'rm -rf "$selector_bin_dir"' EXIT
        ln -s "$(command -v bazelisk)" "$selector_bin_dir/bazel"

        args=(go run ./tools/impactedtests manifest --range "${BAZEL_IMPACTED_BASE_SHA}.." --output "$MANIFEST_PATH")
        while IFS= read -r scope; do
          if [[ -n "$scope" ]]; then
            args+=(--scope "$scope")
          fi
        done <<< "$SCOPES"

        echo "Selecting impacted Bazel tests for range ${BAZEL_IMPACTED_BASE_SHA}.."
        if ! PATH="$selector_bin_dir:$PATH" "${args[@]}"; then
          echo "WARNING: impacted selector failed; proceeding with the full Bazel task" >&2
          rm -f "$MANIFEST_PATH"
          echo "execution_mode=full" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ ! -s "$MANIFEST_PATH" ]]; then
          echo "No impacted Bazel test targets selected"
          echo "execution_mode=skip" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Selected Bazel test targets:"
        sed 's/^/  /' "$MANIFEST_PATH"
        echo "execution_mode=selective" >> "$GITHUB_OUTPUT"

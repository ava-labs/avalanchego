# Packaging tasks for avalanchego and subnet-evm (RPM, DEB, and macOS zips).
#
# RPMs are built inside a Rocky Linux 9 container (glibc 2.34).
# DEBs are built inside an Ubuntu 22.04 container (glibc 2.35).
# Both formats are signed inline by nfpm.
# macOS zips are built + signed in a debian:stable-slim container, mirroring
# the workflow's ubuntu-24.04 sign-publish job. Local test uses a self-signed
# Apple cert + ephemeral GPG key when real credentials aren't provided.
# PACKAGING_TAG defaults to v0.0.0 for local testing; set for release builds.

version: '3'

vars:
  # Repo root, computed from this Taskfile's location so that the
  # packaging Taskfile works both as an include and standalone.
  REPO_ROOT:
    sh: cd "{{.TASKFILE_DIR}}/../.." && pwd
  # Go version from the project's go.mod.
  PACKAGING_GO_VERSION:
    sh: go list -m -f '{{ "{{.GoVersion}}" }}' | head -1
  # Map uname -m to RPM arch names (arm64 -> aarch64).
  PACKAGING_RPM_HOST_ARCH:
    sh: |
      arch=$(uname -m)
      case "${arch}" in
        x86_64) echo "x86_64" ;;
        arm64)  echo "aarch64" ;;
        *)      echo "${arch}" ;;
      esac
  # Map uname -m to DEB arch names (x86_64 -> amd64).
  PACKAGING_DEB_HOST_ARCH:
    sh: |
      arch=$(uname -m)
      case "${arch}" in
        x86_64)        echo "amd64" ;;
        aarch64|arm64) echo "arm64" ;;
        *)             echo "${arch}" ;;
      esac
  # Git commit hash, resolved on host (container may not have .git for worktrees).
  PACKAGING_GIT_COMMIT:
    sh: git rev-parse HEAD
  # Default tag for local testing; overridden by CI for release builds.
  PACKAGING_TAG: '{{env "PACKAGING_TAG" | default "v0.0.0"}}'
  PACKAGING_RPM_DOCKER_IMAGE: avalanchego-rpm-builder
  PACKAGING_DEB_DOCKER_IMAGE: avalanchego-deb-builder
  PACKAGING_RPM_OUTPUT_DIR: '{{.REPO_ROOT}}/build/rpm'
  PACKAGING_DEB_OUTPUT_DIR: '{{.REPO_ROOT}}/build/deb'
  # rcodesign version, sourced from the macOS release workflow so the local
  # validator and the CI runner pin the same Apple-signing tool.
  PACKAGING_APPLE_CODESIGN_VERSION:
    sh: awk -F'"' '/APPLE_CODESIGN_PKG_VERSION:/ {print $2; exit}' "{{.REPO_ROOT}}/.github/workflows/build-macos-release.yml"
  PACKAGING_MACOS_DOCKER_IMAGE: avalanchego-macos-zip-builder
  PACKAGING_MACOS_OUTPUT_DIR: '{{.REPO_ROOT}}/build/macos'

tasks:
  default:
    desc: Lists available packaging tasks
    silent: true
    cmd: task --list | grep packaging

  build-avalanchego-deb:
    desc: Builds DEB for avalanchego
    vars:
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_DEB_HOST_ARCH}}'
    deps: [build-builder-docker-image-deb]
    cmds:
      - task: build-package
        vars:
          PACKAGE: avalanchego
          NFPM_PACKAGER: deb
          TAG: '{{.PACKAGING_TAG}}'
          PACKAGE_ARCH: '{{.PACKAGE_ARCH}}'
          OUTPUT_DIR: '{{.PACKAGING_DEB_OUTPUT_DIR}}'
          DOCKER_IMAGE: '{{.PACKAGING_DEB_DOCKER_IMAGE}}'
          GPG_KEY_FILE: '{{.GPG_KEY_FILE | default ""}}'

  build-avalanchego-rpm:
    desc: Builds RPM for avalanchego
    vars:
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_RPM_HOST_ARCH}}'
    deps: [build-builder-docker-image-rpm]
    cmds:
      - task: build-package
        vars:
          PACKAGE: avalanchego
          NFPM_PACKAGER: rpm
          TAG: '{{.PACKAGING_TAG}}'
          PACKAGE_ARCH: '{{.PACKAGE_ARCH}}'
          OUTPUT_DIR: '{{.PACKAGING_RPM_OUTPUT_DIR}}'
          DOCKER_IMAGE: '{{.PACKAGING_RPM_DOCKER_IMAGE}}'
          GPG_KEY_FILE: '{{.GPG_KEY_FILE | default ""}}'

  build-builder-docker-image-deb:
    desc: Builds the DEB builder Docker image
    internal: true
    env:
      GO_VERSION: '{{.PACKAGING_GO_VERSION}}'
      DOCKER_IMAGE: '{{.PACKAGING_DEB_DOCKER_IMAGE}}'
      CONTEXT_DIR: '{{.REPO_ROOT}}/.github/packaging'
      DOCKERFILE: Dockerfile.deb
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/build-builder-image.sh'

  build-builder-docker-image-rpm:
    desc: Builds the RPM builder Docker image
    internal: true
    env:
      GO_VERSION: '{{.PACKAGING_GO_VERSION}}'
      DOCKER_IMAGE: '{{.PACKAGING_RPM_DOCKER_IMAGE}}'
      CONTEXT_DIR: '{{.REPO_ROOT}}/.github/packaging'
      DOCKERFILE: Dockerfile.rpm
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/build-builder-image.sh'

  build-debs:
    desc: Builds DEBs for both avalanchego and subnet-evm
    cmds:
      - task: build-avalanchego-deb
      - task: build-subnet-evm-deb

  build-package:
    desc: Builds a package in the supplied builder Docker image
    internal: true
    requires:
      vars: [PACKAGE, NFPM_PACKAGER, TAG, PACKAGE_ARCH, OUTPUT_DIR, DOCKER_IMAGE]
    env:
      GPG_KEY_PASSPHRASE: '{{.GPG_KEY_PASSPHRASE}}'
      VERSION: '{{trimPrefix "v" .TAG}}'
      TAG: '{{.TAG}}'
    cmds:
      - cmd: mkdir -p {{.OUTPUT_DIR}}
      - cmd: >-
          docker run --rm
          -v {{.REPO_ROOT}}:/build
          -v {{.OUTPUT_DIR}}:/output
          {{if .GPG_KEY_FILE}}-v {{.GPG_KEY_FILE}}:{{.GPG_KEY_FILE}}:ro{{end}}
          -e NFPM_PACKAGER={{.NFPM_PACKAGER}}
          -e PACKAGE={{.PACKAGE}}
          -e VERSION
          -e TAG
          -e PACKAGE_ARCH={{.PACKAGE_ARCH}}
          -e OUTPUT_DIR=/output
          -e AVALANCHEGO_COMMIT={{.PACKAGING_GIT_COMMIT}}
          {{if .GPG_KEY_FILE}}-e GPG_KEY_FILE={{.GPG_KEY_FILE}}{{end}}
          {{if .GPG_KEY_PASSPHRASE}}-e GPG_KEY_PASSPHRASE{{end}}
          {{.DOCKER_IMAGE}}
          .github/packaging/scripts/build-package.sh

  build-rpms:
    desc: Builds RPMs for both avalanchego and subnet-evm
    cmds:
      - task: build-avalanchego-rpm
      - task: build-subnet-evm-rpm

  build-subnet-evm-deb:
    desc: Builds DEB for subnet-evm
    vars:
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_DEB_HOST_ARCH}}'
    deps: [build-builder-docker-image-deb]
    cmds:
      - task: build-package
        vars:
          PACKAGE: subnet-evm
          NFPM_PACKAGER: deb
          TAG: '{{.PACKAGING_TAG}}'
          PACKAGE_ARCH: '{{.PACKAGE_ARCH}}'
          OUTPUT_DIR: '{{.PACKAGING_DEB_OUTPUT_DIR}}'
          DOCKER_IMAGE: '{{.PACKAGING_DEB_DOCKER_IMAGE}}'
          GPG_KEY_FILE: '{{.GPG_KEY_FILE | default ""}}'

  build-subnet-evm-rpm:
    desc: Builds RPM for subnet-evm
    vars:
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_RPM_HOST_ARCH}}'
    deps: [build-builder-docker-image-rpm]
    cmds:
      - task: build-package
        vars:
          PACKAGE: subnet-evm
          NFPM_PACKAGER: rpm
          TAG: '{{.PACKAGING_TAG}}'
          PACKAGE_ARCH: '{{.PACKAGE_ARCH}}'
          OUTPUT_DIR: '{{.PACKAGING_RPM_OUTPUT_DIR}}'
          DOCKER_IMAGE: '{{.PACKAGING_RPM_DOCKER_IMAGE}}'
          GPG_KEY_FILE: '{{.GPG_KEY_FILE | default ""}}'

  test-build-debs:
    desc: Builds and validates DEBs end-to-end
    cmds:
      - task: build-debs
      - task: validate-debs

  test-build-rpms:
    desc: Builds and validates RPMs end-to-end
    cmds:
      - task: build-rpms
      - task: validate-rpms

  validate-debs:
    desc: Validates built DEBs by installing and smoke testing in fresh containers
    env:
      TAG: '{{.PACKAGING_TAG}}'
      GIT_COMMIT: '{{.PACKAGING_GIT_COMMIT}}'
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_DEB_HOST_ARCH}}'
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/validate-deb.sh'

  validate-rpms:
    desc: Validates built RPMs by installing and smoke testing in a fresh container
    env:
      TAG: '{{.PACKAGING_TAG}}'
      GIT_COMMIT: '{{.PACKAGING_GIT_COMMIT}}'
      PACKAGE_ARCH: '{{.PACKAGE_ARCH | default .PACKAGING_RPM_HOST_ARCH}}'
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/validate-rpm.sh'

  build-macos-zip-builder-docker-image:
    desc: Builds the macOS zip validator Docker image
    internal: true
    env:
      GO_VERSION: '{{.PACKAGING_GO_VERSION}}'
      APPLE_CODESIGN_VERSION: '{{.PACKAGING_APPLE_CODESIGN_VERSION}}'
      DOCKER_IMAGE: '{{.PACKAGING_MACOS_DOCKER_IMAGE}}'
      CONTEXT_DIR: '{{.REPO_ROOT}}/.github/packaging'
      DOCKERFILE: Dockerfile.macos-zip
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/build-macos-zip-builder-image.sh'

  build-macos-zip:
    desc: Builds and signs macOS zip archives (Apple + GPG); ephemeral creds if not provided
    vars:
      MACOS_TAG: '{{.PACKAGING_TAG}}'
    env:
      GPG_KEY_PASSPHRASE: '{{.GPG_KEY_PASSPHRASE}}'
      MACOS_SIGNING_PKCS12_BASE64: '{{.MACOS_SIGNING_PKCS12_BASE64}}'
      MACOS_SIGNING_PASSWORD: '{{.MACOS_SIGNING_PASSWORD}}'
      MACOS_NOTARIZATION_AUTH_KEY: '{{.MACOS_NOTARIZATION_AUTH_KEY}}'
      MACOS_NOTARIZATION_KEY_ID: '{{.MACOS_NOTARIZATION_KEY_ID}}'
      MACOS_NOTARIZATION_ISSUER_ID: '{{.MACOS_NOTARIZATION_ISSUER_ID}}'
    deps: [build-macos-zip-builder-docker-image]
    cmds:
      - cmd: mkdir -p {{.PACKAGING_MACOS_OUTPUT_DIR}}
      - cmd: >-
          docker run --rm
          -v {{.REPO_ROOT}}:/build
          -v {{.PACKAGING_MACOS_OUTPUT_DIR}}:/output
          {{if .GPG_KEY_FILE}}-v {{.GPG_KEY_FILE}}:{{.GPG_KEY_FILE}}:ro{{end}}
          -e TAG={{.MACOS_TAG}}
          -e OUTPUT_DIR=/output
          {{if .GPG_KEY_FILE}}-e GPG_KEY_FILE={{.GPG_KEY_FILE}}{{end}}
          {{if .GPG_KEY_PASSPHRASE}}-e GPG_KEY_PASSPHRASE{{end}}
          {{if .MACOS_SIGNING_PKCS12_BASE64}}-e MACOS_SIGNING_PKCS12_BASE64{{end}}
          {{if .MACOS_SIGNING_PASSWORD}}-e MACOS_SIGNING_PASSWORD{{end}}
          {{if .MACOS_NOTARIZATION_AUTH_KEY}}-e MACOS_NOTARIZATION_AUTH_KEY{{end}}
          {{if .MACOS_NOTARIZATION_KEY_ID}}-e MACOS_NOTARIZATION_KEY_ID{{end}}
          {{if .MACOS_NOTARIZATION_ISSUER_ID}}-e MACOS_NOTARIZATION_ISSUER_ID{{end}}
          {{.PACKAGING_MACOS_DOCKER_IMAGE}}
          .github/packaging/scripts/build-macos-zip.sh

  validate-macos-zip:
    desc: Validates built macOS zips by verifying signatures and contents in a fresh container
    env:
      TAG: '{{.PACKAGING_TAG}}'
      PACKAGING_DOCKER_IMAGE: '{{.PACKAGING_MACOS_DOCKER_IMAGE}}'
    deps: [build-macos-zip-builder-docker-image]
    cmds:
      - cmd: '{{.REPO_ROOT}}/.github/packaging/scripts/validate-macos-zip.sh'

  test-build-macos-zip:
    desc: Builds and validates macOS zips end-to-end
    cmds:
      - task: build-macos-zip
      - task: validate-macos-zip

name: avalanchego
arch: "${PACKAGE_ARCH}"
version: "${VERSION}"
maintainer: "Ava Labs <security@avalabs.org>"
description: "AvalancheGo node — the official Avalanche protocol implementation"
homepage: "https://github.com/ava-labs/avalanchego"
license: "BSD-3-Clause"
depends:
  - "libc6 (>= 2.35)"
contents:
  - src: "${BINARY_PATH}"
    # Debian Policy §9.1.2: packaged files must not live under /usr/local.
    # Keep this path in sync with .github/packaging/scripts/validate-deb.sh.
    dst: /usr/bin/avalanchego
    file_info:
      mode: 0755
changelog: "${NFPM_CHANGELOG}"
deb:
  compression: gzip
  signature:
    key_file: "${NFPM_SIGNING_KEY}"

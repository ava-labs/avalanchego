# https://taskfile.dev
# To run on a system without task installed, `../scripts/run_task.sh` will
# prefer host task, otherwise use the repo's nix-pinned task when nix is
# installed, otherwise bootstrap task via `go tool`.
# If in the nix dev shell, repo tasks use the pinned toolchain.

version: '3'

vars:
  # Task entrypoints run through the repo's nix wrapper so they use the pinned
  # dev-shell toolchain when nix is available, without nesting nix shells.
  NIX_RUN: '{{printf "%s/../scripts/nix_run.sh" .TASKFILE_DIR}}'
  REPO_MODULE: github.com/ava-labs/strevm

tasks:
  default: '{{.NIX_RUN}} ../scripts/run_task.sh --list'

  strevm-rewrite-imports:
    desc: Rewrite imports of out-of-tree REPO_NAME to in-tree REPO_NAME
    cmd: bash ./scripts/rewrite-imports.sh {{.REPO_MODULE}}

  strevm-subtree-merge:
    desc: Perform git subtree merge of strevm into graft/strevm (commits)
    cmd: bash ./scripts/subtree-merge.sh {{.REPO_MODULE}} master strevm

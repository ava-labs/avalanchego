# https://taskfile.dev
# To run on a system without task installed, `./scripts/run_task.sh` will
# prefer a real task on PATH, otherwise bootstrap task via `go tool`.
# If in the nix dev shell, repo tasks use the pinned toolchain.

version: '3'

env:
  AVALANCHEGO_BUILD_PATH: '{{.AVALANCHEGO_BUILD_PATH | default (printf "%s/../../build" .TASKFILE_DIR) }}'

vars:
  NIX_RUN: '{{printf "%s/../../scripts/nix_run.sh" .TASKFILE_DIR}}'
  PROJECT_DIR: '{{.TASKFILE_DIR}}'

tasks:
  default: '{{.NIX_RUN}} ./scripts/run_task.sh --list'

  build:
    desc: Compile Subnet EVM binary with git commit and static linking flags
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/build.sh {{.CLI_ARGS}}"'

  build-bench-precompiles:
    desc: Run benchmark tests for precompile contracts with timeout and coverage
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/build_bench_precompiles.sh"'

  build-antithesis-images:
    desc: Build docker images for antithesis for the subnet-evm test setup
    env:
      TEST_SETUP: subnet-evm
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../../scripts/build_antithesis_images.sh"'

  build-docker-image:
    desc: Build multi-platform Docker image with avalanchego integration and optional publishing
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/build_docker_image.sh"'

  check-clean-branch:
    desc: Checks that the git working tree is clean
    cmds:
      - cmd: '{{.NIX_RUN}} git add --all'
      - cmd: '{{.NIX_RUN}} bash -c "git update-index --really-refresh >> /dev/null"'
      - cmd: '{{.NIX_RUN}} git status --short'
      - cmd: '{{.NIX_RUN}} git diff-index --quiet HEAD'

  check-generate-bindings:
    desc: Checks that generated Go bindings from all Solidity contracts are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-bindings
      - task: check-clean-branch

  check-generate-codec:
    desc: Checks that generated codec files are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-codec
      - task: check-clean-branch

  check-generate-mocks:
    desc: Checks that generated mocks are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-mocks
      - task: check-clean-branch

  check-generate-rlp:
    desc: Checks that generated rlp files are up-to-date (requires a clean git working tree)
    cmds:
      - task: generate-rlp
      - task: check-clean-branch

  check-go-mod-tidy:
    desc: Checks that all go.mod and go.sum files are up-to-date (requires a clean git working tree)
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && go mod tidy"'
      - task: check-clean-branch

  coverage:
    desc: Display test coverage statistics from coverage.out file
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/coverage.sh"'

  generate-bindings:
    desc: Generates Go bindings from Solidity contracts (searches for all compile.go files)
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && find . -type f -name ''gen_*binding.go'' -exec grep -l ''^// Code generated - DO NOT EDIT\\.$'' {} \; | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && find . -type f \( -name ''*.abi'' -o -name ''*.bin'' \) ! -path ''*/artifacts/*'' | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && find . -type f -name ''compile.go'' -execdir go generate {} \;"'

  generate-codec:
    desc: Generates fjl/gencodec files
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && grep -lr -E ''^// Code generated by github\\.com/fjl/gencodec\\. DO NOT EDIT\\.$'' . | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && go generate -run gencodec ./..."'

  generate-mocks:
    desc: Generates testing mocks
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && grep -lr -E ''^// Code generated by MockGen\\. DO NOT EDIT\\.$'' . | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && go generate -run mockgen ./..."'

  generate-rlp:
    desc: Generates rlp files
    cmds:
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && grep -lr -E ''^// Code generated by rlpgen\\. DO NOT EDIT.\\.$'' . | xargs -r rm"'
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && go generate -run rlpgen ./..."'

  lint:
    desc: Runs all lint checks
    cmds:
      - task: _lint-readonly-parallel
      - task: _lint-tree-mutating-serial

  lint-ci:
    desc: Runs all lint checks one-by-one
    cmds:
      - task: lint-go
      - task: shellcheck
      - task: check-generate-codec
      - task: check-generate-mocks
      - task: check-generate-rlp
      - task: check-generate-bindings

  lint-go:
    desc: Run golangci-lint and check for allowed Ethereum imports in Go code
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../evm/scripts/lint.sh"'

  lint-go-fix:
    desc: Run golangci-lint with auto-fix where possible
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../evm/scripts/lint_fix.sh"'

  shellcheck:
    desc: Run shellcheck static analysis on all shell scripts with version management
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../../scripts/shellcheck.sh"'

  _lint-readonly-parallel:
    internal: true
    deps:
      - lint-go
      - shellcheck

  _lint-tree-mutating-serial:
    internal: true
    cmds:
      - task: check-generate-codec
      - task: check-generate-mocks
      - task: check-generate-rlp
      - task: check-generate-bindings

  test-build-antithesis-images:
    desc: Test the build of antithesis images for the subnet-evm test setup
    env:
      TEST_SETUP: subnet-evm
    cmds:
      - cmd: '{{.NIX_RUN}} {{.PROJECT_DIR}}/../../scripts/run_task.sh avalanchego:build-race-gomod'
      - task: build
      - cmd: "{{.NIX_RUN}} bash -c 'cd {{.PROJECT_DIR}} && go run ./tests/antithesis --avalanchego-path=../../build/avalanchego --plugin-dir=../../build/plugins --duration=120s'"
      - cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../../scripts/tests.build_antithesis_images.sh"'

  test-build-image:
    desc: Test docker image build
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && bash -x scripts/tests.build_docker_image.sh"'

  test-e2e-load:
    desc: Run end-to-end load tests using Ginkgo test framework
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/run_ginkgo_load.sh"'

  test-e2e-load-ci:
    desc: Run E2E load tests with CI setup
    cmds:
      - cmd: '{{.NIX_RUN}} {{.PROJECT_DIR}}/../../scripts/run_task.sh avalanchego:build-gomod'
      - task: build
      - task: test-e2e-load

  test-e2e-warp:
    desc: Run end-to-end warp tests using Ginkgo test framework
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && bash -x ./scripts/run_ginkgo_warp.sh"'

  test-e2e-warp-ci:
    desc: Run E2E warp tests with CI setup
    cmds:
      - cmd: '{{.NIX_RUN}} {{.PROJECT_DIR}}/../../scripts/run_task.sh avalanchego:build-gomod'
      - task: build
      - task: test-e2e-warp

  test-unit-bazel:
    desc: Run subnet-evm unit tests with Bazel
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ../../scripts/run_bazel_ci_command.sh test //graft/subnet-evm/..."'

  test-unit-gomod:
    desc: Run all Go tests with retry logic for flaky tests, race detection, and coverage reporting
    cmd: '{{.NIX_RUN}} bash -c "cd {{.PROJECT_DIR}} && ./scripts/build_test.sh"'

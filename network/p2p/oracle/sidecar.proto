// This file documents the sidecar RPC contract. The HTTP/JSON client in
// http_sidecar_client.go implements this protocol without generated code.
// When buf tooling is available, run `buf generate` from the repo root and
// replace http_sidecar_client.go with a generated gRPC client.

syntax = "proto3";

package externalsidecar;

option go_package = "github.com/ava-labs/avalanchego/proto/pb/externalsidecar";

// ExternalSidecar is implemented by the process that queries the source chain
// (e.g. a Solana RPC node). The node calls Verify once per cache miss on the
// external signature handler. The sidecar must be safe for concurrent calls.
service ExternalSidecar {
  // Verify checks that the event described by the ExternalMessage actually
  // occurred on the source chain. Returns OK on success, INVALID_ARGUMENT if
  // the event cannot be confirmed, UNAVAILABLE if the source chain is
  // unreachable.
  rpc Verify(VerifyRequest) returns (VerifyResponse) {}
}

message VerifyRequest {
  // message_bytes is the canonical codec encoding of the ExternalMessage
  // (the bytes that will be signed). The sidecar decodes this to learn what
  // event to look up on the source chain.
  bytes message_bytes = 1;
  // justification carries lookup hints supplied by the relayer (e.g. a Solana
  // transaction signature). Not part of the signed output.
  bytes justification = 2;
}

// Empty response — success is signalled by the gRPC status code OK.
message VerifyResponse {}

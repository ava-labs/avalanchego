# GitHub pending review helper tasks.

version: '3'

vars:
  PENDING_REVIEW_REPO_ROOT:
    sh: cd "{{.TASKFILE_DIR}}/../.." && pwd
  PENDING_REVIEW_NIX_RUN: '{{printf "%s/scripts/nix_run.sh" .PENDING_REVIEW_REPO_ROOT}}'
  PENDING_REVIEW_CONFIG_DIR:
    sh: echo "${GH_PENDING_REVIEW_CONFIG_DIR:-${HOME}/.config/gh-pending-review}"

tasks:
  default:
    desc: Lists available pendingreview tasks
    silent: true
    cmd: task --list | grep pendingreview

  test-tool:
    desc: Run deterministic gh-pending-review tests (no agent skill suite)
    cmd: >-
      {{.PENDING_REVIEW_NIX_RUN}} go test ./tools/pendingreview/... -count=1

  test-skill:
    desc: Run agent-driven pending-review skill tests (slow)
    cmd: >-
      {{.PENDING_REVIEW_NIX_RUN}} go test ./agents/skills/pending-review/tests -count=1

  test:
    desc: Run deterministic tool tests, then agent-driven pending-review skill tests
    cmds:
      - task: test-tool
      - task: test-skill

  auth-login:
    desc: Start the isolated gh auth login flow used by gh-pending-review
    cmds:
      - cmd: >-
          printf '%s\n' \
          'Starting isolated GitHub CLI auth for gh-pending-review.' \
          'When prompted with "Authenticate Git with your GitHub credentials?", answer "n".' \
          'This config is for API access only and should not configure Git auth.'
      - cmd: >-
          env -u GH_TOKEN -u GITHUB_TOKEN -u GH_ENTERPRISE_TOKEN -u GITHUB_ENTERPRISE_TOKEN
          GH_CONFIG_DIR="{{.PENDING_REVIEW_CONFIG_DIR}}"
          {{.PENDING_REVIEW_NIX_RUN}} gh auth login --hostname github.com --web --git-protocol https

  auth-status:
    desc: Show isolated gh auth status used by gh-pending-review
    cmd: >-
      env -u GH_TOKEN -u GITHUB_TOKEN -u GH_ENTERPRISE_TOKEN -u GITHUB_ENTERPRISE_TOKEN
      GH_CONFIG_DIR="{{.PENDING_REVIEW_CONFIG_DIR}}"
      {{.PENDING_REVIEW_NIX_RUN}} gh auth status --hostname github.com

  auth-logout:
    desc: Invalidate isolated gh auth used by gh-pending-review
    cmd: >-
      env -u GH_TOKEN -u GITHUB_TOKEN -u GH_ENTERPRISE_TOKEN -u GITHUB_ENTERPRISE_TOKEN
      GH_CONFIG_DIR="{{.PENDING_REVIEW_CONFIG_DIR}}"
      {{.PENDING_REVIEW_NIX_RUN}} gh auth logout --hostname github.com

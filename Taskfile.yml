# https://taskfile.dev
# Root Taskfile is the repository entrypoint. Project-owned workflows live in
# project taskfiles and are included here under namespaces.

version: '3'

includes:
  avalanchego:
    taskfile: .tasks/avalanchego.yml
  bazel:
    taskfile: .bazel/Taskfile.yml
  coreth:
    taskfile: graft/coreth/Taskfile.yml
  evm:
    taskfile: graft/evm/Taskfile.yml
  git:
    taskfile: .tasks/git.yml
  go:
    taskfile: .tasks/go.yml
  packaging:
    taskfile: .github/packaging/Taskfile.yml
  subnet-evm:
    taskfile: graft/subnet-evm/Taskfile.yml
  tools:
    taskfile: tools/Taskfile.yml

tasks:
  default: './scripts/run_task.sh --list'

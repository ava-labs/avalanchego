[package]
name = "firewood-storage"
version = "0.6.0"
edition.workspace = true
authors = [
     "Aaron Buchwald <aaron.buchwald56@gmail.com>",
     "Ron Kuris <ron.kuris@avalabs.org>",
     "Suyan Qu <36519575+qusuyan@users.noreply.github.com>",
]
description = "Storage layer for Firewood, an embedded key-value store optimized for blockchain state."
license-file.workspace = true
homepage.workspace = true
repository.workspace = true
readme.workspace = true
rust-version.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Workspace dependencies
aquamarine.workspace = true
bytemuck.workspace = true
bytemuck_derive.workspace = true
fastrace.workspace = true
firewood-metrics.workspace = true
hex.workspace = true
integer-encoding.workspace = true
metrics.workspace = true
metrics-util = { workspace = true, optional = true }
nonzero_ext.workspace = true
rand = { workspace = true, optional = true }
sha2.workspace = true
smallvec.workspace = true
thiserror.workspace = true
# Regular dependencies
bitfield = "0.19.4"
bitflags = "2.11.1"
fjall = "=2.11.2" # 3.0.0 has breaking changes
derive-where = "1.6.1"
enum-as-inner = "0.7.0"
git-version = "0.3.9"
indicatif = "0.18.4"
lru = "0.16.4"
lru-mem = "0.3.0"
parking_lot.workspace = true
triomphe = "0.1.15"
weak-table = "0.3.2"
# Optional dependencies
io-uring = { version = "0.7.12", optional = true }
log = { version = "0.4.29", optional = true }
sha3 = "0.10.9"
bumpalo = { version = "3.20.2", features = ["collections", "std"] }
arc-swap = "1.9.1"

[dev-dependencies]
cfg-if = "1.0.4"
# Workspace dependencies
criterion = { workspace = true, features = ["html_reports"] }
metrics-util.workspace = true
pprof = { workspace = true, features = ["flamegraph"] }
rand.workspace = true
rlp = "0.6.1"
tempfile.workspace = true
test-case.workspace = true

[build-dependencies]
bytemuck.workspace = true
sha2.workspace = true

[features]
logger = ["log"]
io-uring = ["dep:io-uring"]
ethhash = []
test_utils = ["dep:metrics-util", "dep:rand"]

[[bench]]
name = "serializer"
harness = false

[[bench]]
name = "rlp"
harness = false
required-features = ["test_utils"]

[lints]
workspace = true
